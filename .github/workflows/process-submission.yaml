name: Process Submission

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Parse and save submission
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python scripts/parse_submission.py \
            --issue-number "$ISSUE_NUMBER" \
            --issue-body "$ISSUE_BODY" \
            --issue-author "$ISSUE_AUTHOR"

      - name: Commit submission
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions/
          git diff --staged --quiet || {
            git commit -m "Process submission from ${{ github.event.issue.user.login }} (#${{ github.event.issue.number }})"
            git push
          }

      - name: Comment on issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ 답안이 접수되었습니다!

            정답 공개일에 자동 채점됩니다. 결과는 scores 페이지에서 확인하세요.
