name: Reveal Answers

on:
  schedule:
    # Every day at 00:00 UTC (09:00 KST)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      week_number:
        description: "Force reveal for specific week (optional)"
        required: false
        type: number

permissions:
  contents: write

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Reveal answers
        env:
          GROUP_SALT: ${{ secrets.GROUP_SALT }}
        run: |
          python scripts/reveal_answers.py \
            ${{ inputs.week_number && format('--week {0}', inputs.week_number) || '' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add answers/
          # Only commit if there are changes
          git diff --staged --quiet || {
            git commit -m "Reveal answers for due weeks"
            git push
          }

      - name: Trigger scoring
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: answers-revealed
