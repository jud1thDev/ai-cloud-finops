<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scores - FinOps Study</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">F</div>
        <span class="brand-text">FinOps Study</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="problems.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Problems
        </a>
        <a href="submit.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Submit Answer
        </a>
        <a href="scores.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          Scores
        </a>
        <a href="profile.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="materials.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Materials
        </a>
        <div class="sidebar-section-label">Admin</div>
        <a href="admin.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer" id="auth-area"></div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left"><h1>Scores & Leaderboard</h1></div>
        <div class="topbar-right"></div>
      </header>

      <div class="content">
        <div id="scores-loading" class="loading">
          <div class="spinner"></div>
          <p>Loading scores...</p>
        </div>

        <div id="scores-content" style="display:none;">
          <!-- Week tabs -->
          <div class="tabs" id="week-tabs"></div>

          <!-- Leaderboard -->
          <div class="card" style="margin-bottom:20px;">
            <div class="card-header-bar">
              <span style="font-weight:600;">Leaderboard</span>
            </div>
            <div style="overflow-x:auto;">
              <table id="leaderboard-table">
                <thead>
                  <tr>
                    <th style="width:50px;">#</th>
                    <th>Member</th>
                    <th style="width:80px;">Score</th>
                    <th style="width:80px;">Max</th>
                    <th style="width:70px;">%</th>
                    <th style="width:140px;">Progress</th>
                  </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
              </table>
            </div>
          </div>

          <!-- My Scores Detail -->
          <div class="card" id="my-scores-card" style="display:none;">
            <div class="card-header-bar">
              <span style="font-weight:600;">My Detailed Scores</span>
            </div>
            <div class="card-body" id="my-scores-detail"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/scores.js"></script>
</body>
</html>
