name: Generate Weekly Problems

on:
  workflow_dispatch:
    inputs:
      week_number:
        description: "Week number (e.g., 1, 2, 3)"
        required: true
        type: number
      level:
        description: "Problem level"
        required: true
        type: choice
        options:
          - L1
          - L2
          - L3
      num_problems:
        description: "Number of problems per member"
        required: true
        type: number
        default: 3
      category:
        description: "Category filter (leave empty for all)"
        required: false
        type: string
      reveal_date:
        description: "Answer reveal date (YYYY-MM-DD)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Create week config
        run: |
          mkdir -p config/weeks
          cat > config/weeks/week-$(printf '%02d' ${{ inputs.week_number }}).yaml << 'YAML'
          week: ${{ inputs.week_number }}
          level: "${{ inputs.level }}"
          num_problems: ${{ inputs.num_problems }}
          category: ${{ inputs.category || 'null' }}
          reveal_date: "${{ inputs.reveal_date }}"
          description: "Week ${{ inputs.week_number }} - ${{ inputs.level }} problems"
          YAML

      - name: Generate problems
        env:
          GROUP_SALT: ${{ secrets.GROUP_SALT }}
        run: |
          python scripts/generate_week.py \
            --week ${{ inputs.week_number }} \
            --level ${{ inputs.level }} \
            --num-problems ${{ inputs.num_problems }} \
            ${{ inputs.category && format('--category {0}', inputs.category) || '' }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/weeks/ problems/
          git commit -m "Generate week ${{ inputs.week_number }} problems (${{ inputs.level }}, ${{ inputs.num_problems }} problems)"
          git push
