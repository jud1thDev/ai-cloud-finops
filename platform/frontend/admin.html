<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FinOps Study</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">F</div>
        <span class="brand-text">FinOps Study</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="problems.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Problems
        </a>
        <a href="submit.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Submit Answer
        </a>
        <a href="scores.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          Scores
        </a>
        <a href="profile.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="materials.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Materials
        </a>
        <div class="sidebar-section-label">Admin</div>
        <a href="admin.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer" id="auth-area"></div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left"><h1>Admin Settings</h1></div>
        <div class="topbar-right"></div>
      </header>

      <div class="content">
        <div id="admin-denied" class="alert alert-warning" style="display:none;">
          관리자 권한이 필요합니다.
        </div>

        <div id="admin-content" style="display:none;">
          <!-- Generate Week -->
          <div class="card" style="margin-bottom:20px;">
            <div class="card-header-bar">
              <span style="font-weight:600;">Generate Weekly Problems</span>
              <span class="badge badge-admin">Admin Only</span>
            </div>
            <div class="card-body-lg">
              <div class="form-grid">
                <div class="form-group">
                  <label for="gen-week">Week Number</label>
                  <input type="number" id="gen-week" min="1" value="1">
                </div>
                <div class="form-group">
                  <label for="gen-level">Level</label>
                  <select id="gen-level">
                    <option value="L1">L1 - Beginner</option>
                    <option value="L2">L2 - Intermediate</option>
                    <option value="L3">L3 - Advanced</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="gen-num">Problems per Member</label>
                  <input type="number" id="gen-num" min="1" max="10" value="3">
                </div>
                <div class="form-group">
                  <label for="gen-category">Category</label>
                  <select id="gen-category">
                    <option value="">All categories</option>
                    <option value="unused">unused</option>
                    <option value="overprovisioning">overprovisioning</option>
                    <option value="rate">rate</option>
                    <option value="anomaly">anomaly</option>
                    <option value="tagging">tagging</option>
                    <option value="network">network</option>
                    <option value="architecture">architecture</option>
                    <option value="data">data</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="gen-reveal">Reveal Date</label>
                  <input type="date" id="gen-reveal">
                </div>
              </div>

              <div id="gen-result" style="display:none;" class="alert"></div>
              <button onclick="triggerGenerate()" class="btn btn-primary" id="gen-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Generate
              </button>
            </div>
          </div>

          <div class="grid grid-2">
            <!-- Members -->
            <div class="card">
              <div class="card-header-bar"><span style="font-weight:600;">Members</span></div>
              <div class="card-body" id="members-list">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>

            <!-- Submission Status -->
            <div class="card">
              <div class="card-header-bar"><span style="font-weight:600;">Submission Status</span></div>
              <div class="card-body" id="submissions-status">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Manual Actions -->
          <div class="card" style="margin-top:20px;">
            <div class="card-header-bar"><span style="font-weight:600;">Manual Actions</span></div>
            <div class="card-body">
              <div class="quick-actions">
                <button onclick="triggerReveal()" class="btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  Force Reveal Answers
                </button>
                <button onclick="triggerScore()" class="btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  Force Score Week
                </button>
              </div>
              <div id="action-result" class="alert" style="display:none; margin-top:16px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal">
      <h2>GitHub Login</h2>
      <div class="form-group">
        <label for="token-input">Personal Access Token</label>
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <p id="login-error" class="error" style="color:var(--red);font-size:13px;"></p>
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:20px;">
        <button onclick="hideLoginModal()" class="btn">Cancel</button>
        <button onclick="handleLogin()" class="btn btn-primary">Login</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
