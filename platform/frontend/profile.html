<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - FinOps Study</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">F</div>
        <span class="brand-text">FinOps Study</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="problems.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Problems
        </a>
        <a href="submit.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Submit Answer
        </a>
        <a href="scores.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          Scores
        </a>
        <a href="profile.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="materials.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Materials
        </a>
        <a href="create-problem.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Create Problem
        </a>
        <a href="guide.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Guide
        </a>
        <div class="sidebar-section-label">Admin</div>
        <a href="admin.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer" id="auth-area"></div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="page-title">Profile</h1>
        </div>
        <div class="topbar-right">
          <!-- Member switcher (visible to all) -->
          <select id="member-select" class="btn btn-sm" style="padding:6px 12px;font-size:13px;cursor:pointer;" onchange="switchMember(this.value)">
            <option value="">Loading...</option>
          </select>
        </div>
      </header>

      <div class="content">
        <div id="profile-loading" class="loading">
          <div class="spinner"></div>
          <p>Loading profile...</p>
        </div>

        <div id="profile-content" style="display:none;">
          <!-- User Card -->
          <div class="card" style="margin-bottom:24px;">
            <div class="card-body-lg" style="display:flex;align-items:center;gap:20px;">
              <div id="profile-avatar" style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4c6ef5,#7950f2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700;flex-shrink:0;"></div>
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                  <span id="profile-name" style="font-size:22px;font-weight:700;"></span>
                  <span id="profile-role" class="badge badge-admin" style="display:none;"></span>
                </div>
                <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:14px;color:var(--text-secondary);">
                  <span id="profile-github" style="display:flex;align-items:center;gap:4px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                  </span>
                  <span id="profile-joined" style="display:flex;align-items:center;gap:4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                  </span>
                </div>
              </div>
            </div>
          </div>

          <!-- Stats Overview -->
          <div class="stats-row" style="margin-bottom:24px;">
            <div class="stat-card">
              <div class="stat-value" id="stat-weeks">0</div>
              <div class="stat-label">Weeks Participated</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-submitted">0</div>
              <div class="stat-label">Submissions</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-avg-score" style="color:var(--primary);">-</div>
              <div class="stat-label">Avg Score</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-best-rank" style="color:var(--green);">-</div>
              <div class="stat-label">Best Rank</div>
            </div>
          </div>

          <!-- Score Trend Chart -->
          <div class="card" style="margin-bottom:24px;">
            <div class="card-header-bar">
              <span style="font-weight:600;">Score Trend</span>
              <span style="font-size:12px;color:var(--text-muted);">Weekly score progression</span>
            </div>
            <div class="card-body">
              <canvas id="score-trend-chart" height="200"></canvas>
            </div>
          </div>

          <!-- Submission History -->
          <div class="card" style="margin-bottom:24px;">
            <div class="card-header-bar">
              <span style="font-weight:600;">Submission History</span>
              <span class="badge" id="submission-count-badge" style="background:var(--primary-light);color:var(--primary);"></span>
            </div>
            <div style="overflow-x:auto;">
              <table id="submissions-table">
                <thead>
                  <tr>
                    <th>Week</th>
                    <th>Scenario</th>
                    <th>Level</th>
                    <th>Status</th>
                    <th>Score</th>
                    <th>Files</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="submissions-body"></tbody>
              </table>
            </div>
          </div>

          <!-- Per-Week Score Details -->
          <div id="week-details"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
