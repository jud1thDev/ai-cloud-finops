scenarios:
  # --------------------------------------------------------------------------
  # L3-035: Athena 파티셔닝 없는 대형 테이블
  # --------------------------------------------------------------------------
  - id: "L3-035"
    title: "Athena 파티셔닝 없는 대형 테이블 전체 스캔"
    category: "data"
    level: "L3"
    aws_services: ["Athena", "S3", "Glue"]
    description: |
      Glue Data Catalog에 등록된 10TB 규모 S3 테이블이 파티셔닝 없이 운영되고 있다.
      하루 평균 50건의 Athena 쿼리가 매번 전체 테이블을 풀 스캔하여 쿼리당 10TB를
      스캔한다. 동일 데이터를 날짜 기준 파티셔닝하면 쿼리당 약 100GB만 스캔하여
      비용을 100배 절감할 수 있다. Athena 과금은 스캔 데이터 TB당 $5이다.
    detection_method: "bytes_scanned_per_query vs partitioned_table comparison"
    resources:
      problem:
        - type: "aws_glue_catalog_table"
          config:
            database_name: "analytics_db"
            table_name: "raw_events"
            storage_location: "s3://data-lake-prod/raw_events/"
            partition_keys: []
            total_data_size_tb: 10
            format: "parquet"
          count: 1
        - type: "aws_s3_bucket"
          config:
            bucket_name: "data-lake-prod"
            prefix: "raw_events/"
            total_size_tb: 10
          count: 1
      decoy:
        - type: "aws_glue_catalog_table"
          config:
            database_name: "analytics_db"
            table_name: "processed_events"
            storage_location: "s3://data-lake-prod/processed_events/"
            partition_keys: ["year", "month", "day"]
            total_data_size_tb: 8
            format: "parquet"
          count: 1
    metrics_profile:
      problem_resources:
        bytes_scanned_per_query_gb:
          type: "constant"
          value: 10000
        query_count_per_day:
          type: "normal"
          mean: 50
          std: 10
      decoy_resources:
        bytes_scanned_per_query_gb:
          type: "normal"
          mean: 100
          std: 30
        query_count_per_day:
          type: "normal"
          mean: 50
          std: 10
    cost_profile:
      monthly_waste_usd: 7500
      services_affected: ["Athena", "S3"]
      pricing_note: "Athena $5/TB scanned. 50 queries × 30 days × 10TB × $5 = $75,000 vs partitioned $750. Attributable waste ~$7,500/mo after caching and optimization adjustments."
    answer:
      severity: "critical"
      problem_summary: "10TB Glue 테이블에 파티셔닝이 없어 모든 Athena 쿼리가 전체 테이블을 풀 스캔한다. 파티셔닝된 동일 규모 테이블 대비 100배 이상의 스캔 비용이 발생한다."
      recommendation: "날짜 기준(year/month/day) 파티셔닝을 적용하고 MSCK REPAIR TABLE 또는 Glue Crawler로 파티션을 등록한다. 추가로 Athena 워크그룹에 쿼리당 스캔량 상한을 설정한다."
      savings_estimate_monthly_usd: 7500
      evidence_pointers:
        - "bytes_scanned_per_query_gb constant 10,000GB vs decoy 100GB"
        - "partition_keys가 빈 배열"
        - "query_count 일 50건 × 월 30일 = 1,500건 풀 스캔"
    scoring:
      identify_problem: 30
      identify_root_cause: 20
      propose_solution: 30
      estimate_savings: 20
    tags: ["athena", "partitioning", "s3", "glue", "full-scan", "data-lake"]

  # --------------------------------------------------------------------------
  # L3-036: Redshift 클러스터 24/7 Always-On
  # --------------------------------------------------------------------------
  - id: "L3-036"
    title: "배치 분석용 Redshift 클러스터 24/7 Always-On 운영"
    category: "overprovisioning"
    level: "L3"
    aws_services: ["Redshift"]
    description: |
      4노드 ra3.xlplus Redshift 클러스터가 배치 분석 전용으로 사용되고 있으나
      24/7 상시 가동 중이다. 실제 쿼리는 평일 업무 시간(09-18시)에 집중되며
      야간·주말에는 거의 사용되지 않는다. 전체 시간 중 약 30%만 활용되고
      나머지 70%는 유휴 상태에서 과금되고 있다.
    detection_method: "query_activity temporal pattern vs cluster uptime analysis"
    resources:
      problem:
        - type: "aws_redshift_cluster"
          config:
            cluster_identifier: "analytics-prod"
            node_type: "ra3.xlplus"
            number_of_nodes: 4
            schedule: "always-on"
            encrypted: true
          count: 1
      decoy:
        - type: "aws_redshift_cluster"
          config:
            cluster_identifier: "analytics-scheduled"
            node_type: "ra3.xlplus"
            number_of_nodes: 4
            schedule: "paused-nights-weekends"
            encrypted: true
            pause_resume_schedule: "cron(0 9 ? * MON-FRI *) / cron(0 18 ? * MON-FRI *)"
          count: 1
    metrics_profile:
      problem_resources:
        query_count_per_hour:
          type: "sawtooth"
          high_period: "09:00-18:00 MON-FRI"
          high_value: 40
          low_period: "18:00-09:00 and weekends"
          low_value: 0
        cpu_percent:
          type: "normal"
          mean: 15
          std: 10
      decoy_resources:
        query_count_per_hour:
          type: "sawtooth"
          high_period: "09:00-18:00 MON-FRI"
          high_value: 40
          low_period: "paused"
          low_value: 0
        cpu_percent:
          type: "normal"
          mean: 45
          std: 15
    cost_profile:
      monthly_waste_usd: 782
      services_affected: ["Redshift"]
      pricing_note: "ra3.xlplus $0.382/hr per node. 4 nodes × $0.382 × 730 hrs = $1,115/mo total. 70% idle → $782/mo waste."
    answer:
      severity: "high"
      problem_summary: "배치 분석 전용 Redshift 클러스터가 24/7 가동 중이나 실제 활용률은 30%에 불과하다. 야간과 주말에 쿼리가 거의 없어 70%의 비용이 낭비되고 있다."
      recommendation: "Redshift 일시 중지/재개 스케줄을 설정하여 업무 시간(평일 09-18시)에만 가동한다. 또는 Redshift Serverless로 전환하여 실제 사용량 기반 과금으로 변경한다."
      savings_estimate_monthly_usd: 782
      evidence_pointers:
        - "query_count sawtooth 패턴: 업무 시간 외 near-zero"
        - "cpu_percent 평균 15%로 전반적으로 낮음"
        - "schedule always-on 설정"
    scoring:
      identify_problem: 30
      identify_root_cause: 20
      propose_solution: 30
      estimate_savings: 20
    tags: ["redshift", "always-on", "scheduling", "pause-resume", "batch-analytics"]

  # --------------------------------------------------------------------------
  # L3-037: S3 Cross-Region Replication 전체 버킷 적용
  # --------------------------------------------------------------------------
  - id: "L3-037"
    title: "S3 Cross-Region Replication 전체 버킷 무분별 적용"
    category: "data"
    level: "L3"
    aws_services: ["S3"]
    description: |
      DR(재해 복구) 목적으로 S3 Cross-Region Replication이 설정되어 있으나,
      prefix 필터 없이 20TB 버킷 전체가 복제되고 있다. 실제 DR에 필요한
      데이터는 전체의 20%(약 4TB)에 불과하며, 나머지 80%는 임시 파일,
      로그, 중간 처리 데이터로 복제할 필요가 없다.
    detection_method: "replication configuration filter analysis + object classification"
    resources:
      problem:
        - type: "aws_s3_bucket_replication_configuration"
          config:
            source_bucket: "data-primary-us-east-1"
            destination_bucket: "data-dr-us-west-2"
            source_region: "us-east-1"
            destination_region: "us-west-2"
            filter: null
            total_size_tb: 20
            critical_data_ratio: 0.2
          count: 1
      decoy:
        - type: "aws_s3_bucket_replication_configuration"
          config:
            source_bucket: "app-primary-us-east-1"
            destination_bucket: "app-dr-us-west-2"
            source_region: "us-east-1"
            destination_region: "us-west-2"
            filter:
              prefix: "critical/"
            total_size_tb: 5
            critical_data_ratio: 0.9
          count: 1
    metrics_profile:
      problem_resources:
        replication_bytes_mb_per_hour:
          type: "normal"
          mean: 1000
          std: 300
        source_storage_tb:
          type: "constant"
          value: 20
      decoy_resources:
        replication_bytes_mb_per_hour:
          type: "normal"
          mean: 200
          std: 50
        source_storage_tb:
          type: "constant"
          value: 5
    cost_profile:
      monthly_waste_usd: 368
      services_affected: ["S3"]
      pricing_note: "불필요 복제 16TB × $0.023/GB/mo (S3 Standard us-west-2) = $368/mo. 추가로 CRR 데이터 전송 비용과 PUT 요청 비용도 발생."
    answer:
      severity: "medium"
      problem_summary: "S3 CRR이 prefix 필터 없이 전체 버킷(20TB)에 적용되어 있다. DR에 필요한 데이터는 20%에 불과하며, 나머지 80%(16TB)의 복제 스토리지 및 전송 비용이 낭비되고 있다."
      recommendation: "CRR 규칙에 prefix 필터(예: critical/, production/)를 적용하여 필수 데이터만 복제한다. 또는 태그 기반 복제 필터를 설정하여 DR 대상 객체만 선별 복제한다."
      savings_estimate_monthly_usd: 368
      evidence_pointers:
        - "replication filter가 null (전체 버킷 복제)"
        - "critical_data_ratio 0.2 — 실제 필요 데이터 20%"
        - "replication_bytes 1000MB/hr vs decoy 200MB/hr (5배 차이)"
    scoring:
      identify_problem: 30
      identify_root_cause: 20
      propose_solution: 30
      estimate_savings: 20
    tags: ["s3", "cross-region-replication", "disaster-recovery", "filter", "prefix"]

  # --------------------------------------------------------------------------
  # L3-038: EKS Pod resource request 과잉
  # --------------------------------------------------------------------------
  - id: "L3-038"
    title: "EKS Pod CPU Request 과잉으로 인한 노드 낭비"
    category: "overprovisioning"
    level: "L3"
    aws_services: ["EKS", "EC2"]
    description: |
      EKS 클러스터에서 Pod의 CPU request가 1000m(1 vCPU)로 설정되어 있으나
      실제 사용량은 100-200m에 불과하다. 과도한 request로 인해 m5.2xlarge(8 vCPU)
      노드당 Pod 3-4개만 스케줄링되어, 20개 노드가 평균 CPU 15%로 운영되고 있다.
      적절한 request 설정 시 5개 노드로 동일 워크로드 처리가 가능하다.
    detection_method: "pod cpu request vs actual usage ratio + node utilization analysis"
    resources:
      problem:
        - type: "aws_eks_cluster"
          config:
            cluster_name: "prod-main"
            version: "1.28"
            total_pods: 80
            pod_cpu_request_millicores: 1000
            pod_cpu_actual_millicores: 150
          count: 1
        - type: "aws_instance"
          config:
            instance_type: "m5.2xlarge"
            role: "eks-node"
            vcpu: 8
            memory_gb: 32
          count: 20
      decoy:
        - type: "aws_instance"
          config:
            instance_type: "m5.xlarge"
            role: "eks-node-right-sized"
            vcpu: 4
            memory_gb: 16
          count: 5
    metrics_profile:
      problem_resources:
        node_cpu_percent:
          type: "normal"
          mean: 15
          std: 5
        pod_cpu_usage_millicores:
          type: "normal"
          mean: 150
          std: 50
        pods_per_node:
          type: "constant"
          value: 4
      decoy_resources:
        node_cpu_percent:
          type: "normal"
          mean: 65
          std: 10
        pod_cpu_usage_millicores:
          type: "normal"
          mean: 150
          std: 50
        pods_per_node:
          type: "constant"
          value: 16
    cost_profile:
      monthly_waste_usd: 3360
      services_affected: ["EC2", "EKS"]
      pricing_note: "m5.2xlarge $0.384/hr. 적정 노드 5개로 운영 가능하나 버퍼 포함 시 15개 초과 노드 × $0.384 × 730 ≈ $4,205. 안전 마진 감안 waste ~$3,360/mo."
    answer:
      severity: "critical"
      problem_summary: "EKS Pod CPU request(1000m)가 실사용(150m)의 약 7배로 과잉 설정되어 있다. 이로 인해 노드당 Pod 배치가 3-4개로 제한되어 20개 노드를 운영하지만, 적정 request 시 5개 노드로 충분하다."
      recommendation: "VPA(Vertical Pod Autoscaler)를 도입하여 실사용량 기반 request를 자동 조정한다. CPU request를 200-250m으로 하향하고 Cluster Autoscaler/Karpenter로 노드를 자동 축소한다."
      savings_estimate_monthly_usd: 3360
      evidence_pointers:
        - "pod_cpu_request 1000m vs pod_cpu_usage 평균 150m (6.7배 과잉)"
        - "node_cpu_percent 평균 15% (극심한 미활용)"
        - "pods_per_node 4개 (m5.2xlarge 8 vCPU 기준 매우 낮음)"
    scoring:
      identify_problem: 30
      identify_root_cause: 20
      propose_solution: 30
      estimate_savings: 20
    tags: ["eks", "kubernetes", "cpu-request", "overprovisioning", "vpa", "node-scaling"]

  # --------------------------------------------------------------------------
  # L3-039: CloudFront 없이 S3 Direct Egress
  # --------------------------------------------------------------------------
  - id: "L3-039"
    title: "CloudFront 없이 S3 Direct Egress로 글로벌 서빙"
    category: "network"
    level: "L3"
    aws_services: ["S3", "CloudFront"]
    description: |
      글로벌 사용자에게 S3 버킷에서 직접 콘텐츠를 서빙하고 있다. 월 5TB의
      데이터 전송이 발생하며, S3 직접 전송 비용 $0.09/GB가 부과된다.
      CloudFront를 사용하면 $0.085/GB로 단가가 낮아지고, 캐시 적중으로
      오리진 전송량이 약 60% 감소하여 실질적으로 큰 절감이 가능하다.
    detection_method: "S3 access logs origin region analysis + missing CDN distribution"
    resources:
      problem:
        - type: "aws_s3_bucket"
          config:
            bucket_name: "static-assets-prod"
            public_access: true
            website_hosting: true
            monthly_egress_tb: 5
            global_user_distribution: true
          count: 1
      decoy:
        - type: "aws_cloudfront_distribution"
          config:
            distribution_id: "E1ABCDEF12345"
            origin: "media-assets-prod.s3.amazonaws.com"
            price_class: "PriceClass_All"
            cache_hit_ratio: 0.6
          count: 1
        - type: "aws_s3_bucket"
          config:
            bucket_name: "media-assets-prod"
            public_access: false
            oai_enabled: true
            monthly_egress_tb: 2
          count: 1
    metrics_profile:
      problem_resources:
        s3_get_requests_per_hour:
          type: "normal"
          mean: 50000
          std: 10000
        bytes_downloaded_mb_per_hour:
          type: "normal"
          mean: 7000
          std: 1000
      decoy_resources:
        cf_requests_per_hour:
          type: "normal"
          mean: 50000
          std: 10000
        cf_bytes_downloaded_mb_per_hour:
          type: "normal"
          mean: 7000
          std: 1000
        origin_requests_per_hour:
          type: "normal"
          mean: 20000
          std: 5000
    cost_profile:
      monthly_waste_usd: 270
      services_affected: ["S3", "CloudFront"]
      pricing_note: "S3 직접 전송 5TB × $0.09/GB = $450/mo. CF 사용 시 캐시 60% 적중으로 오리진 2TB × $0.085/GB ≈ $170 + CF 전송 비용. 실효 절감 ~$270/mo."
    answer:
      severity: "medium"
      problem_summary: "글로벌 사용자 대상 콘텐츠를 S3에서 직접 서빙하여 높은 데이터 전송 비용이 발생한다. CloudFront CDN을 도입하면 캐싱으로 오리진 전송량이 60% 감소하고, 전송 단가도 낮아진다."
      recommendation: "CloudFront 배포를 생성하고 S3 Origin Access Identity(OAI)를 설정한다. 적절한 캐시 TTL을 구성하고, S3 퍼블릭 접근을 비활성화하여 CloudFront 경유만 허용한다."
      savings_estimate_monthly_usd: 270
      evidence_pointers:
        - "S3 public_access: true, website_hosting: true (직접 서빙)"
        - "monthly_egress_tb 5TB (높은 전송량)"
        - "CloudFront distribution 없음"
        - "decoy에서 cache_hit_ratio 0.6으로 60% 캐시 적중"
    scoring:
      identify_problem: 30
      identify_root_cause: 20
      propose_solution: 30
      estimate_savings: 20
    tags: ["s3", "cloudfront", "cdn", "egress", "data-transfer", "global"]

  # --------------------------------------------------------------------------
  # L3-040: RDS Proxy 없는 Lambda→RDS 직접 연결
  # --------------------------------------------------------------------------
  - id: "L3-040"
    title: "RDS Proxy 없는 Lambda→RDS 직접 연결로 인한 인스턴스 과잉"
    category: "architecture"
    level: "L3"
    aws_services: ["RDS", "Lambda"]
    description: |
      5개의 Lambda 함수가 RDS에 직접 연결하여 동시 실행 시 DB 연결 수가
      500개 이상으로 폭증한다. 이를 감당하기 위해 db.r6g.4xlarge 인스턴스를
      사용하지만, 실제 쿼리 부하(CPU 20%, 메모리 15%)는 db.r6g.large로
      충분하다. RDS Proxy를 도입하면 연결 풀링으로 소형 인스턴스 사용이 가능하다.
    detection_method: "db connection count spike pattern + cpu/memory underutilization on large instance"
    resources:
      problem:
        - type: "aws_db_instance"
          config:
            identifier: "app-db-prod"
            instance_class: "db.r6g.4xlarge"
            engine: "mysql"
            engine_version: "8.0"
            multi_az: true
            max_connections: 5000
          count: 1
        - type: "aws_lambda_function"
          config:
            function_prefix: "api-handler"
            runtime: "python3.11"
            reserved_concurrency: 200
            direct_db_connection: true
          count: 5
      decoy:
        - type: "aws_db_instance"
          config:
            identifier: "app-db-staging"
            instance_class: "db.r6g.large"
            engine: "mysql"
            engine_version: "8.0"
            multi_az: false
          count: 1
        - type: "aws_db_proxy"
          config:
            proxy_name: "app-db-staging-proxy"
            engine_family: "MYSQL"
            target_db: "app-db-staging"
            max_connections_percent: 80
            idle_timeout: 1800
          count: 1
    metrics_profile:
      problem_resources:
        db_connections:
          type: "spike"
          baseline: 30
          spike_value: 500
          spike_frequency: "multiple times per hour during peak"
          spike_duration_seconds: 60
        cpu_percent:
          type: "normal"
          mean: 20
          std: 8
        memory_percent:
          type: "normal"
          mean: 15
          std: 5
      decoy_resources:
        db_connections:
          type: "normal"
          mean: 50
          std: 10
        cpu_percent:
          type: "normal"
          mean: 55
          std: 12
        memory_percent:
          type: "normal"
          mean: 40
          std: 10
    cost_profile:
      monthly_waste_usd: 515
      services_affected: ["RDS", "Lambda"]
      pricing_note: "db.r6g.4xlarge $0.8064/hr vs db.r6g.large $0.1008/hr. 차이 $0.7056/hr × 730 hrs = $515/mo. RDS Proxy 추가 비용($0.015/hr per vCPU) 감안해도 순절감 발생."
    answer:
      severity: "high"
      problem_summary: "Lambda 함수들이 RDS에 직접 연결하여 동시 실행 시 연결 수가 500+로 폭증한다. 연결 수 처리를 위해 db.r6g.4xlarge를 사용하지만, 실제 CPU/메모리 부하는 db.r6g.large 수준이다."
