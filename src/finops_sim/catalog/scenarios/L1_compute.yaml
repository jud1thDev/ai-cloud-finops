  - id: "L1-010"
    title: "DynamoDB 프로비전드 용량 과잉"
    category: "overprovisioning"
    level: "L1"
    aws_services: ["DynamoDB"]
    description: |
      DynamoDB 테이블이 프로비전드 용량 모드로 설정되어 있으나 실제 사용률이 약 10%에 불과합니다.
      피크 트래픽 기준으로 RCU 5000, WCU 1000을 고정 할당했지만, 평균 소비량은 RCU 500, WCU 100 수준입니다.
    detection_method: "프로비전드 용량 대비 실제 ConsumedReadCapacityUnits/ConsumedWriteCapacityUnits 비율이 낮은 테이블 식별"
    resources:
      problem:
        - type: "aws_dynamodb_table"
          config:
            billing_mode: "PROVISIONED"
            write_capacity_units: 1000
            read_capacity_units: 5000
          count: 1
      decoy:
        - type: "aws_dynamodb_table"
          config:
            billing_mode: "PAY_PER_REQUEST"
          count: 1
    metrics_profile:
      problem_resources:
        consumed_write_capacity_units: { type: "normal", mean: 100, std: 30 }
        consumed_read_capacity_units: { type: "normal", mean: 500, std: 100 }
      decoy_resources:
        consumed_write_capacity_units: { type: "normal", mean: 800, std: 200 }
        consumed_read_capacity_units: { type: "normal", mean: 3000, std: 500 }
    cost_profile:
      monthly_waste_usd: 522
      services_affected: ["DynamoDB"]
      pricing_note: "미사용 WCU: 900 × $0.00065/hr × 730hr ≈ $427. 미사용 RCU: 4500 × $0.00013/hr × 730hr ≈ $427. 총 약 $522/mo 낭비 (실사용 대비 초과분)"
    answer:
      severity: "high"
      problem_summary: "DynamoDB 프로비전드 용량이 실제 사용량의 10배로 설정되어 매월 $522 낭비. WCU 1000 중 100만, RCU 5000 중 500만 사용"
      recommendation: "Auto Scaling 활성화 또는 On-Demand 모드로 전환. 트래픽 패턴이 예측 가능하면 Auto Scaling + target utilization 70%로 설정"
      savings_estimate_monthly_usd: 522
      evidence_pointers:
        - "프로비전드 WCU: 1000, 실제 사용: 평균 100 (10%)"
        - "프로비전드 RCU: 5000, 실제 사용: 평균 500 (10%)"
        - "사용률 10% 수준으로 과잉 프로비저닝 명확"
        - "Decoy 테이블은 On-Demand로 적절히 운영 중"
    scoring:
